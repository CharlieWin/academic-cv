bio: |
 Lin Chen is currently a Ph.D. candidate under the advisement of Prof. Qiao 
 at Xidian University, Xi'an, China. He received his B.S. degree from Anhui 
 Polytechnic University in 2019, and his M.S. degree from the Cyberspace 
 Institute of Advanced Technology (Fang Binxing Academician Class), 
 Guangzhou University in 2025. His research primarily focuses on 
 large language models (LLMs), blockchain, and evolutionary games. 
  

